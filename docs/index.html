<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kerala Tourism Guide Chatbot — Ask KT about Kerala's places, food, festivals, backwaters, and travel tips." />
  <title>Kerala Tourism Bot — KT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── App Shell ── -->
  <div class="app-shell">

    <!-- ── Chat Container ── -->
    <div class="chat-container" id="chatContainer">

      <!-- ── Header ── -->
      <header class="chat-header">
        <div class="header-left">
          <div class="avatar bot-avatar" id="headerAvatar">KT</div>
          <div class="header-info">
            <h1 class="header-title">Kerala Tourism Bot</h1>
            <span class="header-status">
              <span class="status-dot"></span>
              Online
            </span>
          </div>
        </div>
        <div class="header-right">
          <span class="header-badge">🌴 Kerala</span>
        </div>
      </header>

      <!-- ── Messages Area ── -->
      <main class="messages-area" id="messagesArea" role="log" aria-live="polite" aria-label="Chat messages">
        <!-- Greeting injected by JS -->
      </main>

      <!-- ── Quick Reply Chips ── -->
      <div class="chips-container" id="chipsContainer">
        <button class="chip chip-plan" id="chip-plan">🗓️ Plan My Trip</button>
        <button class="chip" id="chip-places"    data-msg="Top Places">🗺️ Top Places</button>
        <button class="chip" id="chip-food"      data-msg="Best Food">🍛 Best Food</button>
        <button class="chip" id="chip-festivals" data-msg="Festivals">🎉 Festivals</button>
        <button class="chip" id="chip-tips"      data-msg="Travel Tips">✈️ Travel Tips</button>
        <button class="chip" id="chip-backwaters"data-msg="Backwaters">🚤 Backwaters</button>
      </div>

      <!-- ── Input Bar ── -->
      <footer class="input-bar">
        <div class="input-wrapper">
          <textarea
            id="userInput"
            class="user-input"
            placeholder="Ask about Kerala..."
            maxlength="500"
            rows="1"
            aria-label="Type your message"
          ></textarea>
          <div class="char-count" id="charCount">0 / 500</div>
        </div>
        <button class="send-btn" id="sendBtn" aria-label="Send message" title="Send">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
            <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />
          </svg>
        </button>
      </footer>

    </div><!-- /chat-container -->

  </div><!-- /app-shell -->

  <script src="script.js"></script>

  <!-- ── Itinerary Planner Modal ── -->
  <div class="itin-overlay" id="itinOverlay" role="dialog" aria-modal="true" aria-label="Trip Planner">
    <div class="itin-modal">

      <div class="itin-modal-header">
        <div class="itin-modal-title">
          <span class="itin-icon">🗓️</span>
          <div>
            <h2>Plan My Kerala Trip</h2>
            <p>Fill in your details and KT will craft a personalised itinerary</p>
          </div>
        </div>
        <button class="itin-close-btn" id="itinCloseBtn" aria-label="Close planner">✕</button>
      </div>

      <div class="itin-modal-body">

        <!-- Row 1: From → To -->
        <div class="itin-row">
          <div class="itin-field">
            <label for="itinFrom">🏙️ Starting City</label>
            <select id="itinFrom">
              <option value="Kochi">Kochi</option>
              <option value="Thiruvananthapuram">Thiruvananthapuram</option>
              <option value="Kozhikode">Kozhikode</option>
              <option value="Thrissur">Thrissur</option>
              <option value="Kannur">Kannur</option>
              <option value="Kollam">Kollam</option>
              <option value="Palakkad">Palakkad</option>
            </select>
          </div>
          <div class="itin-arrow">→</div>
          <div class="itin-field">
            <label for="itinTo">📍 Destination</label>
            <select id="itinTo">
              <option value="Munnar">Munnar</option>
              <option value="Alleppey">Alleppey (Backwaters)</option>
              <option value="Wayanad">Wayanad</option>
              <option value="Thekkady">Thekkady (Periyar)</option>
              <option value="Varkala">Varkala</option>
              <option value="Kovalam">Kovalam</option>
              <option value="Fort Kochi">Fort Kochi</option>
              <option value="Thrissur">Thrissur</option>
              <option value="Kannur">Kannur</option>
              <option value="Kozhikode">Kozhikode</option>
            </select>
          </div>
        </div>

        <!-- Row 2: Days + Travelers -->
        <div class="itin-row">
          <div class="itin-field">
            <label for="itinDays">📅 Number of Days</label>
            <input type="number" id="itinDays" min="1" max="7" value="3" />
          </div>
          <div class="itin-field">
            <label for="itinTravelers">👥 Travelers</label>
            <input type="number" id="itinTravelers" min="1" max="20" value="2" />
          </div>
        </div>

        <!-- Row 3: Transport -->
        <div class="itin-field">
          <label>🚗 Mode of Transport</label>
          <div class="itin-transport-chips">
            <button type="button" class="transport-chip active" data-val="Car">🚗 Car</button>
            <button type="button" class="transport-chip" data-val="Bus">🚌 Bus</button>
            <button type="button" class="transport-chip" data-val="Train">🚂 Train</button>
            <button type="button" class="transport-chip" data-val="Any">✨ Any</button>
          </div>
        </div>

        <!-- Row 4: Travel Style -->
        <div class="itin-field">
          <label>🎯 Travel Style <span class="itin-hint">(pick any)</span></label>
          <div class="itin-style-chips">
            <button type="button" class="style-chip active" data-val="Adventure">🏔️ Adventure</button>
            <button type="button" class="style-chip" data-val="Relaxation">🧘 Relaxation</button>
            <button type="button" class="style-chip" data-val="Culture">🎭 Culture</button>
            <button type="button" class="style-chip" data-val="Food">🍛 Food</button>
            <button type="button" class="style-chip" data-val="Nature">🌿 Nature</button>
            <button type="button" class="style-chip" data-val="Family">👨‍👩‍👧 Family</button>
          </div>
        </div>

      </div><!-- /modal-body -->

      <div class="itin-modal-footer">
        <button class="itin-cancel-btn" id="itinCancelBtn">Cancel</button>
        <button class="itin-submit-btn" id="itinSubmitBtn">
          <span id="itinSubmitLabel">✨ Generate Itinerary</span>
        </button>
      </div>

    </div>
  </div><!-- /itin-overlay -->

</body>
</html>
